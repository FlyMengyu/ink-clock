<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>墨迹时钟 v41</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f3ef;
  --surface: #ffffff;
  --border: #111111;
  --text-primary: #080808;
  --text-secondary: #444444;
  --text-muted: #999999;
  --flip-dur: 0.42s;
  --font: 'Courier New', Courier, monospace;
  --app-rotate: 0deg;
  --word-rotate: 0deg;
  --ui-scale: 1.5;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
}

/* ── APP (clock) ─────────────────────────────────── */
#app {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  transform-origin: center center;
  transform: rotate(var(--app-rotate)) scale(var(--ui-scale));
  transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  background: var(--bg);
  z-index: 1;
}

/* ── WORD VIEW (independent rotation + scale) ─────── */
#word-view {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 20px;
  gap: 8px;
  background: var(--bg);
  transform-origin: center center;
  transform: rotate(var(--word-rotate));
  transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  z-index: 100;
  overflow: hidden;
}
#word-view.show { display: flex; }

/* When word-rotate is 90 or 270, swap w/h */
#word-view.wo90, #word-view.wo270 {
  width: 100vh;
  height: 100vw;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) rotate(var(--word-rotate));
}

/* ── FLIP CARD ──────────────────────────────────── */
.flip-unit {
  position: relative;
  overflow: hidden;
  width: var(--fu-w, 80px);
  height: var(--fu-h, 100px);
}

.fu-static {
  position: absolute;
  inset: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--fu-fs, 66px);
  font-weight: 700;
  color: var(--text-primary);
  font-family: var(--font);
  line-height: 1;
}
.fu-static::after {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 1px;
  background: rgba(0,0,0,0.10);
  pointer-events: none;
}

.fu-flip-top, .fu-flip-bot {
  position: absolute;
  left: 0; right: 0;
  height: 50%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--fu-fs, 66px);
  font-weight: 700;
  color: var(--text-primary);
  font-family: var(--font);
  line-height: 1;
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
}
.fu-flip-top {
  top: 0;
  border-radius: 5px 5px 0 0;
  align-items: flex-end;
  padding-bottom: 2px;
  transform-origin: bottom center;
  border-bottom: none;
}
.fu-flip-bot {
  bottom: 0;
  border-radius: 0 0 5px 5px;
  align-items: flex-start;
  padding-top: 2px;
  transform-origin: top center;
  border-top: none;
}

@keyframes ftop-fold {
  0%   { transform: rotateX(0deg); opacity: 1; }
  100% { transform: rotateX(-90deg); opacity: 1; }
}
@keyframes fbot-unfold {
  0%   { transform: rotateX(90deg); opacity: 1; }
  100% { transform: rotateX(0deg); opacity: 1; }
}
.flip-unit.flipping .fu-flip-top {
  animation: ftop-fold var(--flip-dur) ease-in forwards;
}
.flip-unit.flipping .fu-flip-bot {
  animation: fbot-unfold var(--flip-dur) ease-out var(--flip-dur) forwards;
}

/* ── CLOCK VIEW ──────────────────────────────────── */
#clock-view {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  transition: opacity 0.25s;
}

.clock-row {
  display: flex;
  align-items: center;
  gap: 5px;
}
.digit-group { display: flex; gap: 4px; }
.colon-sep {
  font-size: var(--fu-fs, 66px);
  font-weight: 700;
  color: var(--text-primary);
  font-family: var(--font);
  width: 18px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  height: var(--fu-h, 100px);
}

#date-line {
  margin-top: 14px;
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--text-secondary);
  font-family: var(--font);
  text-align: center;
}

/* ── WORD CARD ──────────────────────────────────── */
.wcard {
  border: 2px solid var(--border);
  background: var(--surface);
  padding: 26px 30px 22px;
  max-width: 700px;
  width: 100%;
  position: relative;
}
.wcard-tag {
  position: absolute;
  top: -1px; right: 16px;
  background: var(--border);
  color: var(--surface);
  font-size: 11px;
  letter-spacing: 2px;
  padding: 3px 10px;
  font-family: var(--font);
}
.wcard-tag.review-tag { background: #555; }
.wcard-tag.no-day { display: none; }

.w-eng {
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1.1;
  font-family: var(--font);
  word-break: break-word;
}
.w-phon {
  font-size: 24px;
  color: var(--text-muted);
  margin-top: 6px;
  font-style: italic;
  font-family: Georgia, serif;
}
.w-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0 8px;
}
.w-pos {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-secondary);
  border: 1px solid var(--text-secondary);
  padding: 2px 7px;
  font-family: var(--font);
}
.w-freq {
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text-muted);
  font-family: var(--font);
}
.w-cn {
  font-size: 34px;
  line-height: 1.45;
  font-family: var(--font);
  margin-bottom: 10px;
}
.w-divider {
  width: 30px; height: 1.5px;
  background: var(--text-muted);
  margin: 10px 0;
}
.w-ex-en {
  font-size: 20px;
  font-style: italic;
  color: var(--text-secondary);
  line-height: 1.7;
  font-family: Georgia, serif;
}
.w-ex-en em {
  font-style: normal;
  font-weight: 700;
  color: var(--text-primary);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.w-ex-cn {
  font-size: 18px;
  color: var(--text-muted);
  margin-top: 4px;
  line-height: 1.5;
  font-family: var(--font);
}



/* ── TOOLBAR ────────────────────────────────────── */
#toolbar {
  position: fixed;
  top: 10px; right: 10px;
  display: flex;
  gap: 6px;
  z-index: 500;
}
.tb-btn {
  width: 28px; height: 28px;
  background: transparent;
  border: 1.5px solid var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px;
  font-size: 13px;
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
}
.tb-btn:active { background: #e0e0e0; }

/* bottom hint */


/* ── SETTINGS PANEL ─────────────────────────────── */
#settings-panel {
  display: none;
  position: fixed;
  top: 0; right: 0;
  height: 100%;
  width: 260px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-left: 1.5px solid var(--border);
  z-index: 600;
  padding: 46px 20px 20px;
  overflow-y: auto;
  flex-direction: column;
  gap: 16px;
}
#settings-panel.open { display: flex; }

.sp-close {
  position: absolute; top: 10px; right: 12px;
  background: transparent; border: none;
  cursor: pointer; font-size: 17px;
  color: var(--text-primary);
}
.sp-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; font-family: var(--font); }
.sp-label { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); font-family: var(--font); margin-bottom: 5px; }
.sp-hr { border: none; border-top: 0.5px solid #ddd; }
.sp-group { display: flex; flex-direction: column; }
.sp-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: 4px; }
.sp-row input[type="number"] {
  width: 52px;
  border: 1px solid var(--border);
  background: var(--bg);
  padding: 3px 6px;
  font-size: 12px;
  font-family: var(--font);
  color: var(--text-primary);
  outline: none;
}
.sp-row span { font-size: 11px; color: var(--text-secondary); font-family: var(--font); }

.toggle-wrap {
  display: flex;
  border: 1.5px solid var(--border);
  overflow: hidden;
}
.toggle-opt {
  padding: 3px 10px;
  font-size: 10px;
  font-family: var(--font);
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  letter-spacing: 1px;
}
.toggle-opt.active { background: var(--border); color: var(--surface); }

.font-list { display: flex; flex-direction: column; gap: 4px; }
.font-opt {
  padding: 6px 9px;
  border: 1.5px solid #ccc;
  background: transparent;
  cursor: pointer;
  font-size: 11px;
  color: var(--text-primary);
  text-align: left;
}
.font-opt.active { border-color: var(--border); background: var(--border); color: var(--surface); }

.stat-row { font-size: 11px; color: var(--text-secondary); font-family: var(--font); line-height: 1.9; }
.sp-action-btn {
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: transparent;
  cursor: pointer;
  font-size: 10px;
  font-family: var(--font);
  margin-top: 4px;
  color: var(--text-primary);
  text-align: left;
}
.sp-action-btn:hover { background: #f0f0f0; }

/* DPI preset buttons */
.dpi-presets { display: flex; gap: 4px; flex-wrap: wrap; }
.dpi-btn {
  padding: 4px 8px;
  font-size: 10px;
  font-family: var(--font);
  cursor: pointer;
  background: transparent;
  border: 1.5px solid #ccc;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}
.dpi-btn.active { border-color: var(--border); background: var(--border); color: var(--surface); }

/* word-rotate buttons */
.wrot-presets { display: flex; gap: 4px; }
.wrot-btn {
  padding: 4px 7px;
  font-size: 10px;
  font-family: var(--font);
  cursor: pointer;
  background: transparent;
  border: 1.5px solid #ccc;
  color: var(--text-secondary);
}
.wrot-btn.active { border-color: var(--border); background: var(--border); color: var(--surface); }

/* History list in settings */
#history-list-wrap {
  max-height: 300px;
}
#history-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hi-item {
  display: flex;
  gap: 6px;
  align-items: baseline;
  font-size: 10px;
  font-family: var(--font);
  border-bottom: 0.5px solid #eee;
  padding-bottom: 3px;
}
.hi-idx {
  color: var(--text-muted);
  min-width: 20px;
}
.hi-word {
  font-weight: 700;
  color: var(--text-primary);
  min-width: 70px;
}
.hi-cn {
  color: var(--text-secondary);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.hi-time {
  color: var(--text-muted);
  font-size: 9px;
  min-width: 50px;
  text-align: right;
}

/* ── WORD LIST PANEL ────────────────────────────── */
#wordlist-panel {
  display: none;
  position: fixed;
  top: 0; right: 0;
  height: 100%;
  width: var(--wl-panel-width, 370px);
  background: #ffffff;
  border-left: 1.5px solid var(--border);
  z-index: 999;
  padding: 46px 16px 20px;
  overflow-y: auto;
  flex-direction: column;
  gap: 4px;
}
#wordlist-panel.open { display: flex; }

.wl-close {
  position: absolute; top: 10px; right: 12px;
  background: transparent; border: none;
  cursor: pointer; font-size: 17px;
  color: var(--text-primary);
}
.wl-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px; font-family: var(--font);
  margin-bottom: 8px;
}
.wl-stats {
  font-size: 9px; color: var(--text-muted);
  margin-bottom: 8px; font-family: var(--font);
  letter-spacing: 1px;
}
.wl-item {
  display: flex; gap: 6px; align-items: center;
  padding: 5px 0;
  border-bottom: 0.5px solid #eee;
  font-family: var(--font); font-size: 12px;
  line-height: 1.4;
}
.wl-w {
  font-weight: 700;
  color: var(--text-primary);
  flex: none;
  min-width: 85px;
  max-width: 120px;
  word-break: break-all;
}
.wl-cn {
  color: var(--text-secondary);
  flex: 1 1 auto;
  min-width: 40px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.wl-day {
  font-size: 9px; letter-spacing: 1px;
  color: var(--surface); background: var(--border);
  padding: 1px 5px; border-radius: 2px;
  flex: none;
  white-space: nowrap;
}
.wl-day.empty {
  background: transparent; color: transparent;
}

</style>
</head>
<body>

<div id="app">
  <!-- Clock View -->
  <div id="clock-view">
    <div class="clock-row" id="clock-row"></div>
    <div id="date-line">Loading...</div>
  </div>
</div>

<!-- Word View (independent rotation, outside #app) -->
<div id="word-view">
<div id="word-content" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transform:scale(var(--ui-scale));transform-origin:center center;">
  <div class="wcard" id="wcard">
    <div class="wcard-tag no-day" id="w-tag"></div>
    <div class="w-eng" id="w-eng">—</div>
    <div class="w-phon" id="w-phon"></div>
    <div class="w-meta">
      <div class="w-pos" id="w-pos"></div>
      <div class="w-freq" id="w-freq"></div>
    </div>
    <div class="w-cn" id="w-cn"></div>
    <div class="w-divider"></div>
    <div class="w-ex-en" id="w-ex-en"></div>
    <div class="w-ex-cn" id="w-ex-cn"></div>
  </div>
  </div>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <button class="tb-btn" onclick="toggleSettings()" title="设置">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
      <circle cx="7" cy="7" r="2.1"/>
      <path d="M7 1v1.2M7 11.8V13M1 7h1.2M11.8 7H13M2.6 2.6l.85.85M10.55 10.55l.85.85M2.6 11.4l.85-.85M10.55 3.45l.85-.85"/>
    </svg>
  </button>
  <button class="tb-btn" onclick="toggleWordList()" title="单词列表" style="margin-left:2px;">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
      <line x1="2" y1="3" x2="12" y2="3"/>
      <line x1="2" y1="7" x2="12" y2="7"/>
      <line x1="2" y1="11" x2="12" y2="11"/>
    </svg>
  </button>

</div>

<!-- Settings Panel -->
<div id="settings-panel">
  <button class="sp-close" onclick="toggleSettings()">✕</button>
  <div class="sp-title">设 · 置</div>
  <hr class="sp-hr">

  <!-- Clock rotation -->
  <div class="sp-group">
    <div class="sp-label">时钟旋转角度</div>
    <div class="sp-row" style="gap:4px;">
      <button class="wrot-btn" onclick="setAppRot(0)" id="arot-0">0°</button>
      <button class="wrot-btn" onclick="setAppRot(90)" id="arot-90">90°</button>
      <button class="wrot-btn" onclick="setAppRot(180)" id="arot-180">180°</button>
      <button class="wrot-btn" onclick="setAppRot(270)" id="arot-270">270°</button>
    </div>
  </div>

  <!-- Second-level pace (seconds mode only) -->
  <div class="sp-group" id="sec-pace-group" style="display:none;">
    <div class="sp-label">秒级翻页节奏</div>
    <div class="sp-row" style="gap:4px;">
      <button class="wrot-btn active" onclick="setSecPace(1)" id="secpace-1">1秒</button>
      <button class="wrot-btn" onclick="setSecPace(5)" id="secpace-5">5秒</button>
      <button class="wrot-btn" onclick="setSecPace(10)" id="secpace-10">10秒</button>
      <button class="wrot-btn" onclick="setSecPace(30)" id="secpace-30">30秒</button>
    </div>
  </div>

  <hr class="sp-hr">

  <!-- Word rotation -->
  <div class="sp-group">
    <div class="sp-label">单词视图旋转角度</div>
    <div class="sp-row" style="gap:4px;">
      <button class="wrot-btn" onclick="setWordRot(0)" id="wrot-0">0°</button>
      <button class="wrot-btn" onclick="setWordRot(90)" id="wrot-90">90°</button>
      <button class="wrot-btn" onclick="setWordRot(180)" id="wrot-180">180°</button>
      <button class="wrot-btn" onclick="setWordRot(270)" id="wrot-270">270°</button>
    </div>
  </div>

  <hr class="sp-hr">

  <!-- Time precision -->
  <div class="sp-group">
    <div class="sp-label">时间显示精度</div>
    <div class="toggle-wrap" style="width:fit-content">
      <button class="toggle-opt active" id="prec-min" onclick="setPrec('min')">分钟</button>
      <button class="toggle-opt" id="prec-sec" onclick="setPrec('sec')">秒钟</button>
    </div>
  </div>

  <hr class="sp-hr">

  <!-- Clock pace -->
  <div class="sp-group">
    <div class="sp-label">时钟翻页节奏</div>
    <div style="font-size:10px;color:var(--text-muted);font-family:var(--font);margin-bottom:4px;">UI整分钟时翻一次</div>
    <div class="toggle-wrap" style="width:fit-content">
      <button class="toggle-opt active" id="pace-1" onclick="setPace(1)">每1分</button>
      <button class="toggle-opt" id="pace-5" onclick="setPace(5)">每5分</button>
    </div>
  </div>

  <hr class="sp-hr">

  <!-- Word schedule -->
  <div class="sp-group">
    <div class="sp-label">单词显示节律</div>
    <div class="sp-row">
      每 <input type="number" id="cfg-iv" value="1" min="1" max="60"> <span>分钟</span>
    </div>
    <div class="sp-row">
      最后 <input type="number" id="cfg-dur" value="10" min="5" max="55"> <span>秒显示单词</span>
    </div>
  </div>

  <hr class="sp-hr">

  <!-- Clock DPI -->
  <div class="sp-group">
    <div class="sp-label">时钟DPI缩放</div>
    <div class="sp-row"><input type="range" id="cfg-clock-dpi" min="0.5" max="3.0" step="0.1" value="1.5" oninput="onClockDPIChange(this.value)"><span id="clock-dpi-label" style="min-width:36px;text-align:right;font-size:11px;color:var(--text-secondary);font-family:var(--font);">1.5x</span></div>
  </div>

  <hr class="sp-hr">

  <!-- Word DPI -->
  <div class="sp-group">
    <div class="sp-label">单词DPI缩放</div>
    <div class="sp-row"><input type="range" id="cfg-word-dpi" min="0.5" max="3.0" step="0.1" value="1.0" oninput="onWordDPIChange(this.value)"><span id="word-dpi-label" style="min-width:36px;text-align:right;font-size:11px;color:var(--text-secondary);font-family:var(--font);">1.0x</span></div>
  </div>

  <hr class="sp-hr">

  <!-- Word List Panel Width -->
  <div class="sp-group">
    <div class="sp-label">单词列表面板宽度</div>
    <div class="sp-row"><input type="range" id="cfg-wl-panel-w" min="200" max="600" step="10" value="370" oninput="onWLPanelWidthChange(this.value)"><span id="wl-panel-w-label" style="min-width:36px;text-align:right;font-size:11px;color:var(--text-secondary);font-family:var(--font);">370px</span></div>
  </div>

  <hr class="sp-hr">

  <!-- Re-review Day -->
  <div class="sp-group">
    <div class="sp-label">重新复习某Day单词</div>
    <div class="sp-row">
      <select id="review-day-select" style="font-family:var(--font);font-size:12px;padding:3px 6px;border:1px solid var(--border);background:var(--surface);"></select>
      <button class="sp-action-btn" onclick="reviewSelectedDay()" style="white-space:nowrap;">开始复习</button>
    </div>
    <div id="review-msg" style="font-size:10px;color:var(--text-secondary);margin-top:4px;"></div>
  </div>

  <hr class="sp-hr">

  <!-- Flip speed -->
  <div class="sp-group">
    

  <!-- Font style -->
  <div class="sp-group">
    <div class="sp-label">字体风格</div>
    <div class="font-list" id="font-list">

const seenW = new Set();
const VOCAB_CLEAN = VOCAB.filter(v => { if(seenW.has(v.w)) return false; seenW.add(v.w); return true; });

// =====================================================
// STATE
// =====================================================
let cfg = {
  intervalMin: 1,
  durationSec: 10,
  precision: 'min',
  clockPaceMin: 1,
  clockPaceSec: 1,
  uiScale: 1.5,        // default: 特大 for clock
  wordUiScale: 1.0,    // default: 中 for word
  wordRotateDeg: 0,    // word view rotation (independent)
  wlPanelWidth: 370,   // word list panel width
};

let appRotateDeg = 0;  // clock rotation: 0 | 90 | 180 | 270

let prevDigits = {};
let displayedDigits = {};

let studyQueue = [];
let reviewBuffer = [];
let studyIdx = 0;
let newWordCount = 0;

let showingWord = false;
let shownHistory = [];

const FONTS = [
  "'Courier New', Courier, monospace",
  "Georgia, 'Times New Roman', serif",
  "'Arial Black', 'Franklin Gothic Heavy', sans-serif",
  "'Palatino Linotype', Palatino, serif",
  "Consolas, 'SF Mono', monospace"
];

// =====================================================
// INIT
// =====================================================
function init() {
  loadState();
  buildStudyQueue();
  buildClockDOM();
  tick();
  setInterval(tick, 1000);
  bindSettings();
  updateSettingsUI();
  updateStats();
  renderHistory();
  applyAppRotation(appRotateDeg, false);
  applyWordRotation(cfg.wordRotateDeg, false);
  applyDPI(cfg.uiScale, false);
  applyWLPanelWidth();
}

function loadState() {
  try {
    const c = localStorage.getItem('ik4_cfg');
    if (c) Object.assign(cfg, JSON.parse(c));
    newWordCount = parseInt(localStorage.getItem('ik4_newcount') || '0');
    studyIdx = parseInt(localStorage.getItem('ik4_idx') || '0');
    appRotateDeg = parseInt(localStorage.getItem('ik4_rot') || '0');
    const h = localStorage.getItem('ik4_history');
    if (h) shownHistory = JSON.parse(h);
  } catch(e) {}
  applyFont(parseInt(localStorage.getItem('ik4_font') || '0'), false);
}

function save() {
  localStorage.setItem('ik4_cfg', JSON.stringify(cfg));
  localStorage.setItem('ik4_newcount', String(newWordCount));
  localStorage.setItem('ik4_idx', String(studyIdx));
  localStorage.setItem('ik4_rot', String(appRotateDeg));
  if (shownHistory.length > 500) shownHistory = shownHistory.slice(-500);
  localStorage.setItem('ik4_history', JSON.stringify(shownHistory));
}

function buildStudyQueue() {
  // Day1 words come first (in document order), then remaining words shuffled
  const day1 = VOCAB_CLEAN.filter(v => v.day === 1);
  const rest = shuffle(VOCAB_CLEAN.filter(v => v.day !== 1));
  studyQueue = [...day1, ...rest];
  if (studyIdx >= studyQueue.length) studyIdx = 0;
}

function populateDaySelect() {
  const select = document.getElementById('review-day-select');
  if (!select) return;
  const days = new Set();
  VOCAB_CLEAN.forEach(v => { if (v.day) days.add(v.day); });
  const sortedDays = [...days].sort((a,b) => a-b);
  select.innerHTML = sortedDays.map(d => {
    const count = VOCAB_CLEAN.filter(v => v.day === d).length;
    return '<option value="' + d + '">Day' + d + ' (' + count + '词)</option>';
  }).join('');
}

function reviewSelectedDay() {
  const select = document.getElementById('review-day-select');
  const dayNum = parseInt(select.value);
  if (!dayNum) return;
  const words = VOCAB_CLEAN.filter(v => v.day === dayNum);
  if (words.length === 0) return;
  // Insert at current studyIdx so they appear next
  studyQueue.splice(studyIdx, 0, ...words);
  const msg = document.getElementById('review-msg');
  msg.textContent = '已将 Day' + dayNum + ' 的 ' + words.length + ' 个单词加入复习队列，接下来就会出现';
  save();
  updateStats();
  setTimeout(function() { msg.textContent = ''; }, 4000);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// =====================================================
// DPI / UI SCALE
// =====================================================
function setDPI(scale) {
  cfg.uiScale = scale;
  applyDPI(scale, true);
  save();
}

function applyDPI(scale, animate) {
  document.documentElement.style.setProperty('--ui-scale', scale);
  // Update active button
  document.querySelectorAll('.dpi-btn').forEach(b => b.classList.remove('active'));
  const map = { 0.8:0, 1.0:1, 1.25:2, 1.5:3, 2.0:4 };
  const idx = map[scale] !== undefined ? map[scale] : 2;
  const btns = document.querySelectorAll('#dpi-presets .dpi-btn');
  if (btns[idx]) btns[idx].classList.add('active');
  
  // Re-apply word rotation to update word-content scale
  applyWordRotation(cfg.wordRotateDeg, false);
}

// =====================================================
// APP ROTATION (clock)
// =====================================================
function rotateApp() {
  appRotateDeg = (appRotateDeg + 90) % 360;
  applyAppRotation(appRotateDeg, true);
  save();
}

function flipApp180() {
  appRotateDeg = (appRotateDeg + 180) % 360;
  applyAppRotation(appRotateDeg, true);
  save();
}

function setAppRot(deg) {
  appRotateDeg = deg;
  applyAppRotation(appRotateDeg, true);
  save();
}

function applyAppRotation(deg, animate) {
  const app = document.getElementById('app');
  if (!app) return;
  // app transform: rotate(deg) scale(uiScale)
  const t = `rotate(${deg}deg) scale(${cfg.uiScale})`;
  app.style.transform = t;
  if (!animate) {
    app.style.transition = 'none';
    requestAnimationFrame(() => { app.style.transition = ''; });
  }
  // Update active button
  [0,90,180,270].forEach(d => {
    const btn = document.getElementById('arot-' + d);
    if (btn) btn.classList.toggle('active', d === deg);
  });
}

// =====================================================
// WORD ROTATION (independent)
// =====================================================
function setWordRot(deg) {
  cfg.wordRotateDeg = deg;
  applyWordRotation(deg, true);
  save();
  updateSettingsUI();
  
  // Preview: temporarily show word view with new rotation
  const wv = document.getElementById('word-view');
  if (wv && !wv.classList.contains('show')) {
    wv.classList.add('show');
    setTimeout(() => {
      wv.classList.remove('show');
    }, 1500);
  }
}

function applyWordRotation(deg, animate) {
  const wv = document.getElementById('word-view');
  if (!wv) return;

  // Remove old wo90/wo270 classes
  wv.classList.remove('wo90', 'wo270');

  if (deg === 90 || deg === 270) {
    wv.classList.add(deg === 90 ? 'wo90' : 'wo270');
    wv.style.transform = `translate(-50%,-50%) rotate(${deg}deg)`;
    wv.style.top = '50%';
    wv.style.left = '50%';
    wv.style.width = '100vh';
    wv.style.height = '100vw';
  } else {
    wv.style.transform = `rotate(${deg}deg)`;
    wv.style.top = '0';
    wv.style.left = '0';
    wv.style.width = '100%';
    wv.style.height = '100%';
  }

  // Update word-content scale
  const wc = document.getElementById('word-content');
  if (wc) wc.style.transform = `scale(${cfg.wordUiScale})`;

  if (!animate) {
    wv.style.transition = 'none';
    requestAnimationFrame(() => { wv.style.transition = ''; });
  }

  // Update active button in settings
  [0,90,180,270].forEach(d => {
    const btn = document.getElementById('wrot-' + d);
    if (btn) btn.classList.toggle('active', d === deg);
  });
}

// =====================================================
// CLOCK DOM
// =====================================================
function buildClockDOM() {
  const row = document.getElementById('clock-row');
  row.innerHTML = '';
  prevDigits = {};
  displayedDigits = {};

  const ids = cfg.precision === 'sec'
    ? [['h1','h2'], ['m1','m2'], ['s1','s2']]
    : [['h1','h2'], ['m1','m2']];

  ids.forEach((pair, gi) => {
    if (gi > 0) {
      const col = document.createElement('div');
      col.className = 'colon-sep';
      col.textContent = ':';
      row.appendChild(col);
    }
    const grp = document.createElement('div');
    grp.className = 'digit-group';
    pair.forEach(id => {
      const unit = document.createElement('div');
      unit.className = 'flip-unit';
      unit.id = 'fu-' + id;
      unit.innerHTML = `
        <div class="fu-static"><span id="fv-${id}">0</span></div>
        <div class="fu-flip-top" id="ft-${id}"><span>0</span></div>
        <div class="fu-flip-bot" id="fb-${id}"><span>0</span></div>
      `;
      grp.appendChild(unit);
      prevDigits[id] = null;
      displayedDigits[id] = null;
    });
    row.appendChild(grp);
  });
}

// =====================================================
// TICK
// =====================================================
function tick() {
  const now = new Date();
  const H = String(now.getHours()).padStart(2, '0');
  const M = String(now.getMinutes()).padStart(2, '0');
  const S = String(now.getSeconds()).padStart(2, '0');

  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('date-line').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} 周${days[now.getDay()]}`;

  const min = now.getMinutes();
  const sec = now.getSeconds();

  const isFirstRender = displayedDigits['h1'] === null;
  let shouldFlip = false;
  if (cfg.precision === 'sec') {
    shouldFlip = (sec % cfg.clockPaceSec === 0);
  } else {
    shouldFlip = (sec === 0) && (min % cfg.clockPaceMin === 0);
  }

  if (shouldFlip || isFirstRender) {
    doFlip('h1', H[0]);
    doFlip('h2', H[1]);
    doFlip('m1', M[0]);
    doFlip('m2', M[1]);
    if (cfg.precision === 'sec') {
      doFlip('s1', S[0]);
      doFlip('s2', S[1]);
    }
    displayedDigits['h1'] = H[0];
    displayedDigits['h2'] = H[1];
    displayedDigits['m1'] = M[0];
    displayedDigits['m2'] = M[1];
    displayedDigits['s1'] = S[0];
    displayedDigits['s2'] = S[1];
  }

  // Word trigger
  const totalSec = min * 60 + sec;
  const period = cfg.intervalMin * 60;
  const posInPeriod = totalSec % period;
  const shouldShow = posInPeriod >= (period - cfg.durationSec);

  if (shouldShow && !showingWord) {
    showWordPanel(now);
  } else if (!shouldShow && showingWord) {
    hideWordPanel();
  }

  // Bottom hint
  if (showingWord) {
    const remaining = period - posInPeriod;
    const pct = (remaining / cfg.durationSec) * 100;
  } else {
    const secsToWord = (period - posInPeriod) - cfg.durationSec;
  }
}

// =====================================================
// FLIP LOGIC
// =====================================================
function doFlip(id, newVal) {
  const oldVal = displayedDigits[id];
  if (oldVal === newVal) return;

  const unit = document.getElementById('fu-' + id);
  const staticEl = document.getElementById('fv-' + id);
  const topEl = document.getElementById('ft-' + id);
  const botEl = document.getElementById('fb-' + id);
  if (!unit || !staticEl || !topEl || !botEl) return;

  if (oldVal === null) {
    staticEl.textContent = newVal;
    return;
  }

  topEl.querySelector('span').textContent = oldVal;
  botEl.querySelector('span').textContent = newVal;
  staticEl.textContent = oldVal;

  unit.classList.remove('flipping');
  void unit.offsetWidth;
  unit.classList.add('flipping');

  const halfMs = 420;
  setTimeout(() => { staticEl.textContent = newVal; }, halfMs);
  setTimeout(() => {
    unit.classList.remove('flipping');
    topEl.style.opacity = '0';
    botEl.style.opacity = '0';
  }, halfMs * 2 + 60);
}

// =====================================================
// WORD PANEL
// =====================================================
function getNextWord() {
  if (newWordCount > 0 && newWordCount % 10 === 0 && reviewBuffer.length > 0) {
    const reviewWord = reviewBuffer.shift();
    const reviewCount = (reviewWord._reviewCount || 0) + 1;
    reviewWord._reviewCount = reviewCount;
    if (reviewCount < 3) reviewBuffer.push(reviewWord);
    return { word: reviewWord, isReview: true };
  }
  const word = studyQueue[studyIdx % studyQueue.length];
  studyIdx = (studyIdx + 1) % studyQueue.length;
  const clone = Object.assign({}, word, { _reviewCount: 0 });
  reviewBuffer.push(clone);
  if (reviewBuffer.length > 30) reviewBuffer.shift();
  newWordCount++;
  return { word, isReview: false };
}

function showWordPanel(now) {
  showingWord = true;
  const { word, isReview } = getNextWord();

  const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const last = shownHistory[shownHistory.length - 1];
  if (!last || last.w !== word.w || last.date !== dateStr) {
    shownHistory.push({ w: word.w, cn: word.cn, ph: word.ph, pos: word.pos, freq: word.freq, time: timeStr, date: dateStr });
  }
  save();

  const dayNum = word.day || 0;
  document.getElementById('w-tag').textContent = dayNum > 0 ? 'Day' + dayNum : '';
  document.getElementById('w-tag').className = 'wcard-tag' + (dayNum > 0 ? '' : ' no-day');
  document.getElementById('w-eng').textContent = word.w;
  document.getElementById('w-phon').textContent = word.ph;
  document.getElementById('w-pos').textContent = word.pos;
  document.getElementById('w-freq').textContent = (word.freq || '') + ' 高频';
  document.getElementById('w-cn').textContent = word.cn;
  document.getElementById('w-ex-en').innerHTML = word.ex;
  document.getElementById('w-ex-cn').textContent = word.exc;


  document.getElementById('clock-view').style.opacity = '0';
  document.getElementById('word-view').classList.add('show');
  updateStats();
}

function hideWordPanel() {
  showingWord = false;
  document.getElementById('word-view').classList.remove('show');
  document.getElementById('clock-view').style.opacity = '1';
  renderHistory();
}

}

// toggleHistory removed

function bindSettings() {
  document.getElementById('cfg-iv').addEventListener('change', e => {
    cfg.intervalMin = Math.max(1, Math.min(60, parseInt(e.target.value) || 1));
    e.target.value = cfg.intervalMin;
    save();
  });
  document.getElementById('cfg-dur').addEventListener('change', e => {
    cfg.durationSec = Math.max(5, Math.min(55, parseInt(e.target.value) || 10));
    e.target.value = cfg.durationSec;
    save();
  });
  document.addEventListener('click', e => {
    const sp = document.getElementById('settings-panel');
    const wl = document.getElementById('wordlist-panel');
    const tb = document.getElementById('toolbar');
    if (sp.classList.contains('open') && !sp.contains(e.target) && !tb.contains(e.target))
      sp.classList.remove('open');
    if (wl.classList.contains('open') && !wl.contains(e.target) && !tb.contains(e.target))
      wl.classList.remove('open');
  });
}

function updateSettingsUI() {
  document.getElementById('cfg-iv').value = cfg.intervalMin;
  document.getElementById('cfg-dur').value = cfg.durationSec;
  document.documentElement.style.setProperty('--flip-dur', '0.42s');
  document.getElementById('prec-min').classList.toggle('active', cfg.precision === 'min');

  document.getElementById('pace-1').classList.toggle('active', cfg.clockPaceMin === 1);

  // Sec pace buttons
  document.getElementById('sec-pace-group').style.display = (cfg.precision === 'sec') ? '' : 'none';
  document.getElementById('secpace-1').classList.toggle('active', cfg.clockPaceSec === 1);
  document.getElementById('secpace-5').classList.toggle('active', cfg.clockPaceSec === 5);
  document.getElementById('secpace-10').classList.toggle('active', cfg.clockPaceSec === 10);
  document.getElementById('secpace-30').classList.toggle('active', cfg.clockPaceSec === 30);
  applyDPI(cfg.uiScale, false);
  applyWLPanelWidth();

  // Word rotation buttons
  [0,90,180,270].forEach(d => {
    const btn = document.getElementById('wrot-' + d);

  [0,90,180,270].forEach(d => {

// =====================================================
// HISTORY RENDER
// =====================================================
function renderHistory() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  if (shownHistory.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  const reversed = [...shownHistory].reverse();
  list.innerHTML = reversed.map((h, i) => `
    <div class="hi-item">
      <span class="hi-idx">${shownHistory.length - i}</span>
      <span class="hi-word">${h.w}</span>
      <span class="hi-cn">${h.cn}</span>
    </div>
  `).join('');
}

// =====================================================
// CSV EXPORT
// =====================================================
function exportCSV() {
  if (shownHistory.length === 0) {
    alert('暂无记录可导出');
    return;
  }
  const header = ['序号', '单词', '音标', '词性', '中文释义', '频率', '出现日期', '出现时间'];
  const rows = shownHistory.map((h, i) => [
    i + 1,
    h.w,
    h.ph || '',
    h.pos || '',
    h.cn,
    h.freq || '',
    h.date,
    h.time
  ]);

  const csvContent = [header, ...rows]
    .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
    .join('\n');

  const BOM = '\uFEFF';
  const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `考研单词记录_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toggleWordList() {
  const p = document.getElementById('wordlist-panel');
  const sp = document.getElementById('settings-panel');
  if (sp.classList.contains('open')) sp.classList.remove('open');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderWordList();
}

function renderWordList() {
  const container = document.getElementById('wordlist-content');
  const stats = document.getElementById('wl-stats');
  const total = VOCAB_CLEAN.length;
  const dayCounts = {};
  VOCAB_CLEAN.forEach(v => {
    const d = v.day || 0;
    dayCounts[d] = (dayCounts[d] || 0) + 1;
  });
  const dayParts = Object.keys(dayCounts).filter(k => k > 0).sort((a,b) => a-b).map(d => 'Day'+d+': '+dayCounts[d]+'词');
  stats.textContent = '共 ' + total + ' 词 | ' + dayParts.join(' | ');
  
  container.innerHTML = VOCAB_CLEAN.map(v => {
    const dayLabel = v.day ? 'Day' + v.day : '';
    const dayClass = v.day ? '' : ' empty';
    return '<div class="wl-item">' +
      '<span class="wl-w">' + v.w + '</span>' +
      '<span class="wl-cn">' + v.cn + '</span>' +
      '<span class="wl-day' + dayClass + '">' + dayLabel + '</span>' +
    '</div>';
  }).join('');
}
